  const STORAGE_KEY = 'cleaning-checklist-' + CONFIG.property.name;

    try { return JSON.parse(localStorage.getItem(PHOTOS_KEY)) || {}; } catch(e) { return {}; }
  }

  function saveStoredPhotos(data) {
    localStorage.setItem(PHOTOS_KEY, JSON.stringify(data));
  }

  function getAllPhotos(sectionId) {
    var section = CHECKLIST_DATA.find(function(s) { return s.id === sectionId; });
    var base = section ? (section.photos || []) : [];
    var stored = getStoredPhotos();
    var extra = stored[sectionId] || [];
    return base.concat(extra);
  }

  function getCheckedState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
  }

  function getGuestMode() {
    return localStorage.getItem(GUEST_KEY) || 'yes';
  }

  function showToast(msg) {
    var existing = document.querySelector('.toast');
    if (existing) existing.remove();
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function() { t.classList.add('show'); });

    restoreState();

    '<div class="header">' +
      '<div class="header-row"><span class="header-label">■ 清掃対象物件：</span><span class="header-value">' + esc(CONFIG.property.name) + '<br>' + esc(CONFIG.property.address || '') + '</span></div>' +
      '<div class="header-row"><span class="header-label">■ 清掃時間の目安：</span><span class="header-value">' + esc(CONFIG.property.duration) + '</span></div>' +
      '<div class="header-row"><span class="header-label">■ 入室方法：</span><span class="header-value">キーボックス番号 ' + esc(CONFIG.property.keybox) + '</span></div>' +
    '</div>';
  }

  function renderProgress() {
    return '<div class="progress-wrapper">' +
      '<div class="progress-label"><span id="progress-count">0/0 完了</span><span class="progress-percent" id="progress-pct">0%</span></div>' +
      '<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>' +
    '</div>';
  }

  function renderSafety() {
    return '<div class="safety-notice">' +
      '<div class="safety-title">⚠️ 安全のお願い</div>' +
      '<ul class="safety-list">' +
        '<li>作業中ずっと換気してください</li>' +
        '<li>洗剤を混ぜない（塩素系と酸性）</li>' +
        '<li>手袋・マスク着用推奨</li>' +
        '<li>重い物は無理せず2人で</li>' +
      '</ul>' +
    '</div>';
  }

  function renderSection(sec) {
    var photos = getAllPhotos(sec.id);
    var hasPhotos = photos.length > 0;
    var isOpt = sec.isOptional;
    var cls = 'section-card' + (isOpt ? ' optional' : '');

    var h = '<div class="' + cls + '" data-section="' + sec.id + '">';

    // Header
    h += '<div class="section-header" style="background:' + sec.color.bg + ';color:' + sec.color.text + '">';
    h += '<span class="section-title">' + esc(sec.label);
    if (sec.subtitle) h += '<span class="section-subtitle">' + esc(sec.subtitle) + '</span>';
    h += '</span>';
    if (!hasPhotos) {
      h += '<button class="photo-add-small" data-add-photo="' + sec.id + '" style="border-color:' + sec.color.border + ';color:' + sec.color.text + '">＋</button>';
    }
    h += '</div>';

    // Photo gallery
    if (hasPhotos) {
      h += '<div class="photo-gallery">';
      photos.forEach(function(p, i) {
        h += '<img class="photo-thumb" src="' + p + '" data-photo-section="' + sec.id + '" data-photo-idx="' + i + '" style="border-color:' + sec.color.border + '" alt="">';
      });
      h += '<button class="photo-add-large" data-add-photo="' + sec.id + '" style="border-color:' + sec.color.border + ';color:' + sec.color.text + '">＋</button>';
      h += '</div>';
    }

    // Checklist items
    if (sec.items && sec.items.length > 0) {
      h += '<div class="checklist-items">';
      sec.items.forEach(function(item, i) {
        h += renderItem(sec.id, i, item);
      });
      h += '</div>';
    }

    // Sub boxes
    if (sec.subBoxes) {
      sec.subBoxes.forEach(function(box) {
        h += renderSubBox(sec.id, box, sec.color);
      });
    }

    // Fixed note
    if (sec.fixedNote) {
      h += '<div class="fixed-note">' + esc(sec.fixedNote) + '</div>';
    }

    // Guest toggle
    if (sec.guestToggle) {
      var gm = getGuestMode();
      h += '<div class="guest-toggle">';
      h += '<div class="guest-toggle-btn' + (gm === 'yes' ? ' active-yes' : '') + '" data-guest="yes">☀️ ゲストあり</div>';
      h += '<div class="guest-toggle-btn' + (gm === 'no' ? ' active-no' : '') + '" data-guest="no">🌙 ゲストなし</div>';
      h += '</div>';

      // Guest Yes box
      h += '<div class="guest-box' + (gm !== 'yes' ? ' guest-box-hidden' : '') + '" id="guest-yes" style="background:' + sec.guestYes.color.bg + ';border-color:' + sec.guestYes.color.border + '">';
      h += '<div class="guest-box-title" style="color:' + sec.guestYes.color.text + '">' + esc(sec.guestYes.title) + '</div>';
      sec.guestYes.items.forEach(function(item, i) {
        h += renderItem(sec.id + '-gy', i, item);
      });
      h += '</div>';

      // Guest No box
      h += '<div class="guest-box' + (gm !== 'no' ? ' guest-box-hidden' : '') + '" id="guest-no" style="background:' + sec.guestNo.color.bg + ';border-color:' + sec.guestNo.color.border + '">';
      h += '<div class="guest-box-title" style="color:' + sec.guestNo.color.text + '">' + esc(sec.guestNo.title) + '</div>';
      sec.guestNo.items.forEach(function(item, i) {
        h += renderItem(sec.id + '-gn', i, item);
      });
      h += '</div>';
    }

    h += '</div>';
    return h;
  }

  function renderItem(sectionId, idx, item) {
    var cbId = 'cb-' + sectionId + '-' + idx;
    var h = '<label class="checklist-item" for="' + cbId + '">';
    h += '<input type="checkbox" class="item-checkbox" id="' + cbId + '" data-cb>';
    h += '<span class="item-content"><span class="item-text">' + esc(item.text);
    if (item.badge) {
      var bcls = item.badgeType === 'critical' ? 'badge-critical' : 'badge-warning';
      h += ' <span class="badge ' + bcls + '">' + esc(item.badge) + '</span>';
    }
    h += '</span></span></label>';
    return h;
  }

  function renderSubBox(sectionId, box, parentColor) {
    var bg = box.color ? box.color.bg : parentColor.bg;
    var border = box.color ? box.color.border : parentColor.border;
    var h = '<div class="sub-box" style="background:' + bg + ';border-color:' + border + '">';
    h += '<div class="sub-box-title">';
    if (box.icon) h += box.icon + ' ';
    h += esc(box.title) + '</div>';

    if (box.items) {
      box.items.forEach(function(item, i) {
        if (item.tag) {
          var tagBg = parentColor.bg;
          var tagColor = parentColor.text;
          h += '<div class="sub-box-row">';
          h += '<span class="sub-box-tag" style="background:' + tagBg + ';color:' + tagColor + '">' + esc(item.tag) + '</span>';
          h += '<span class="sub-box-text">' + esc(item.text).replace(/\n/g, '<br>') + '</span>';
          h += '</div>';
        } else {
          h += renderItem(sectionId + '-sb', i, item);
        }
      });
    }
    h += '</div>';
    return h;
  }

  function renderCompletion() {
    return '<div class="completion-box">' +
      '<div class="completion-text">⚠️ お願い ⚠️<br>退去後の状況（忘れ物も）・仕上がり写真は<br>AssistBnB掃除管理アプリより<br><strong>必ずアップロードしてください</strong></div>' +
    '</div>';
  }

  function renderFooter() {
    return '<div class="footer">' +
      '<button class="footer-btn" id="btn-pdf">🖨 PDF出力</button>' +
      '<button class="footer-btn footer-btn-reset" id="btn-reset">🔄 チェックリセット</button>' +
    '</div>';
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ============================== State Management ==============================
  function saveState() {
    var cbs = document.querySelectorAll('[data-cb]');
    var state = {};
    cbs.forEach(function(cb) { state[cb.id] = cb.checked; });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function restoreState() {
    var state = getCheckedState();
    Object.keys(state).forEach(function(id) {
      var cb = document.getElementById(id);
      if (cb) {
        cb.checked = state[id];
        if (state[id]) cb.closest('.checklist-item').classList.add('checked');
      }
    });
  }

  function updateProgress() {
    var total = 0, checked = 0;
    var gm = getGuestMode();

    document.querySelectorAll('.section-card:not(.optional) [data-cb]').forEach(function(cb) {
      var guestBox = cb.closest('.guest-box');
      if (guestBox) {
        if (guestBox.classList.contains('guest-box-hidden')) return;
      }
      total++;
      if (cb.checked) checked++;
    });

    var pct = total > 0 ? Math.round((checked / total) * 100) : 0;
    var countEl = document.getElementById('progress-count');
    var pctEl = document.getElementById('progress-pct');
    var fillEl = document.getElementById('progress-fill');
    if (countEl) countEl.textContent = checked + '/' + total + ' 完了';
    if (pctEl) pctEl.textContent = pct + '%';
    if (fillEl) {
      fillEl.style.width = pct + '%';
      if (pct === 100) fillEl.classList.add('complete');
      else fillEl.classList.remove('complete');
    }
  }

  // ============================== Photo Add ==============================
  function triggerAddPhoto(sectionId) {
    addPhotoTarget = sectionId;
    var input = document.getElementById('photo-file-input');
    input.value = '';
    input.click();
  }

  function handlePhotoFile(file) {
    if (!file || !addPhotoTarget) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      resizeImage(e.target.result, 800, function(base64) {
        var stored = getStoredPhotos();
        if (!stored[addPhotoTarget]) stored[addPhotoTarget] = [];
        stored[addPhotoTarget].push(base64);
        saveStoredPhotos(stored);
        renderApp();
        showToast('写真を追加しました');
      });
    };
    reader.readAsDataURL(file);
  }

  function resizeImage(dataUrl, maxSize, callback) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = dataUrl;
  }

  // ============================== Photo Modal ==============================
  function openModal(sectionId, idx) {
    var photos = getAllPhotos(sectionId);
    if (photos.length === 0) return;
    modalState.sectionId = sectionId;
    modalState.index = idx;
    modalState.photos = photos;
    modalState.scale = 1;
    modalState.tx = 0;
    modalState.ty = 0;

    var m = document.createElement('div');
    m.className = 'photo-modal';
    m.id = 'photo-modal';
    m.innerHTML =
      '<div class="photo-modal-close" id="modal-close">×</div>' +
      '<div class="photo-modal-counter" id="modal-counter">' + (idx + 1) + ' / ' + photos.length + '</div>' +
      (photos.length > 1 ? '<div class="photo-modal-nav photo-modal-prev" id="modal-prev">‹</div><div class="photo-modal-nav photo-modal-next" id="modal-next">›</div>' : '') +
      '<div class="photo-modal-img-wrap" id="modal-wrap"><img class="photo-modal-img" id="modal-img" src="' + photos[idx] + '" alt=""></div>';
    document.body.appendChild(m);
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(function() { m.classList.add('visible'); });
    setupModalEvents();
  }

  function closeModal() {
    var m = document.getElementById('photo-modal');
    if (!m) return;
    m.classList.remove('visible');
    document.body.style.overflow = '';
    setTimeout(function() { m.remove(); }, 200);
  }

  function showModalPhoto(idx) {
    var photos = modalState.photos;
    if (idx < 0) idx = photos.length - 1;
    if (idx >= photos.length) idx = 0;
    modalState.index = idx;
    modalState.scale = 1;
    modalState.tx = 0;
    modalState.ty = 0;
    var img = document.getElementById('modal-img');
    var counter = document.getElementById('modal-counter');
    if (img) { img.src = photos[idx]; img.style.transform = 'translate(0px,0px) scale(1)'; }
    if (counter) counter.textContent = (idx + 1) + ' / ' + photos.length;
  }

  function setupModalEvents() {
    var wrap = document.getElementById('modal-wrap');
    var img = document.getElementById('modal-img');
    if (!wrap || !img) return;

    var startX = 0, startY = 0, moved = false, pinchHappened = false;
    var panStartTx = 0, panStartTy = 0, suppressClick = false;

    function applyTransform() {
      img.style.transform = 'translate(' + modalState.tx + 'px,' + modalState.ty + 'px) scale(' + modalState.scale + ')';
    }
    // 拡大時に画像が動かせる範囲に制限（端まで見えて、外には出すぎない）
    function clampPan() {
      var maxX = img.clientWidth * (modalState.scale - 1) / 2;
      var maxY = img.clientHeight * (modalState.scale - 1) / 2;
      if (modalState.tx > maxX) modalState.tx = maxX;
      if (modalState.tx < -maxX) modalState.tx = -maxX;
      if (modalState.ty > maxY) modalState.ty = maxY;
      if (modalState.ty < -maxY) modalState.ty = -maxY;
    }

    wrap.addEventListener('touchstart', function(e) {
      // 新しい1本指ジェスチャーの開始時だけフラグをリセット
      if (e.touches.length === 1 && modalState.startDist === 0) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        panStartTx = modalState.tx;
        panStartTy = modalState.ty;
        moved = false;
        pinchHappened = false;
        suppressClick = false;
      }
      // 2本指（以上）になったらピンチ開始
      if (e.touches.length >= 2) {
        modalState.startDist = getTouchDist(e.touches);
        pinchHappened = true;
        e.preventDefault();
      }
    }, { passive: false });

    wrap.addEventListener('touchmove', function(e) {
      if (e.touches.length >= 2 && modalState.startDist > 0) {
        // ピンチで拡大縮小
        var d = getTouchDist(e.touches);
        var ns = modalState.scale * (d / modalState.startDist);
        ns = Math.min(Math.max(ns, 1), 5);
        img.style.transform = 'translate(' + modalState.tx + 'px,' + modalState.ty + 'px) scale(' + ns + ')';
        e.preventDefault();
      } else if (e.touches.length === 1 && modalState.scale > 1.1) {
        // 拡大中は1本指ドラッグで画像を移動（パン）
        modalState.tx = panStartTx + (e.touches[0].clientX - startX);
        modalState.ty = panStartTy + (e.touches[0].clientY - startY);
        clampPan();
        applyTransform();
        moved = true;
        e.preventDefault();
      } else if (e.touches.length === 1) {
        moved = true;
      }
    }, { passive: false });

    wrap.addEventListener('touchend', function(e) {
      // 全ての指が離れたらピンチの拡大率を確定
      if (modalState.startDist > 0 && e.touches.length === 0) {
        var match = img.style.transform.match(/scale\(([^)]+)\)/);
        modalState.scale = match ? parseFloat(match[1]) : 1;
        if (modalState.scale < 1.1) {
          modalState.scale = 1; modalState.tx = 0; modalState.ty = 0;
          img.style.transform = 'translate(0px,0px) scale(1)';
        } else {
          clampPan();
          applyTransform();
        }
        modalState.startDist = 0;
      }
      // まだ指が画面に残っている間は何もしない
      if (e.touches.length > 0) return;
      // この操作でピンチが一度でも起きていたら、何もしない（拡大率はそのまま維持）
      if (pinchHappened) { suppressClick = true; return; }
      // 拡大中の場合
      if (modalState.scale > 1.1) {
        // パンせずにタップしたら元の大きさに戻す
        if (!moved) {
          modalState.scale = 1; modalState.tx = 0; modalState.ty = 0;
          img.style.transform = 'translate(0px,0px) scale(1)';
        }
        suppressClick = true;
        return;
      }
      // 左右スワイプで写真切替
      if (moved && e.changedTouches.length > 0) {
        var dx = e.changedTouches[0].clientX - startX;
        var dy = e.changedTouches[0].clientY - startY;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
          if (dx > 0) showModalPhoto(modalState.index - 1);
          else showModalPhoto(modalState.index + 1);
          suppressClick = true;
          return;
        }
      }
      // タップで閉じる（動かしておらず・拡大もしていない時のみ）
      if (!moved) { suppressClick = true; closeModal(); }
    });

    document.getElementById('modal-close').addEventListener('click', function(e) { e.stopPropagation(); closeModal(); });
    var prev = document.getElementById('modal-prev');
    var next = document.getElementById('modal-next');
    if (prev) prev.addEventListener('click', function(e) { e.stopPropagation(); showModalPhoto(modalState.index - 1); });
    if (next) next.addEventListener('click', function(e) { e.stopPropagation(); showModalPhoto(modalState.index + 1); });

    // 背景クリックで閉じる（タップ操作直後のクリックは無視／拡大中は閉じない／PC用）
    wrap.addEventListener('click', function(e) {
      if (suppressClick) { suppressClick = false; return; }
      if (modalState.scale > 1.1) return;
      if (e.target === wrap) closeModal();
    });
  }

  function getTouchDist(touches) {
    var dx = touches[0].clientX - touches[1].clientX;
    var dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // ============================== Events ==============================
  function attachEvents() {
    var app = document.getElementById('app');

    app.addEventListener('change', function(e) {
      if (e.target.hasAttribute('data-cb')) {
        var label = e.target.closest('.checklist-item');
        if (label) {
          if (e.target.checked) label.classList.add('checked');
          else label.classList.remove('checked');
        }
        saveState();
        updateProgress();
      }
    });

    app.addEventListener('click', function(e) {
      // Photo add buttons
      var addBtn = e.target.closest('[data-add-photo]');
      if (addBtn) {
        triggerAddPhoto(addBtn.getAttribute('data-add-photo'));
        return;
      }
      // Photo thumbnails
      var thumb = e.target.closest('[data-photo-section]');
      if (thumb) {
        openModal(thumb.getAttribute('data-photo-section'), parseInt(thumb.getAttribute('data-photo-idx')));
        return;
      }
      // Guest toggle
      var guestBtn = e.target.closest('[data-guest]');
      if (guestBtn) {
        var mode = guestBtn.getAttribute('data-guest');
        localStorage.setItem(GUEST_KEY, mode);
        document.querySelectorAll('.guest-toggle-btn').forEach(function(b) {
          b.classList.remove('active-yes', 'active-no');
          if (b.getAttribute('data-guest') === mode) b.classList.add('active-' + mode);
        });
        var yesBox = document.getElementById('guest-yes');
        var noBox = document.getElementById('guest-no');
        if (yesBox) yesBox.classList.toggle('guest-box-hidden', mode !== 'yes');
        if (noBox) noBox.classList.toggle('guest-box-hidden', mode !== 'no');
        updateProgress();
        return;
      }
      // PDF
      if (e.target.closest('#btn-pdf')) {
        window.print();
        return;
      }
      // Reset
      if (e.target.closest('#btn-reset')) {
        if (confirm('チェックをすべてリセットしますか？')) {
          localStorage.removeItem(STORAGE_KEY);
          document.querySelectorAll('[data-cb]').forEach(function(cb) {
            cb.checked = false;
            var label = cb.closest('.checklist-item');
            if (label) label.classList.remove('checked');
          });
          updateProgress();
          showToast('リセットしました');
        }
        return;
      }
    });

    // File input
    document.getElementById('photo-file-input').addEventListener('change', function(e) {
      if (e.target.files && e.target.files[0]) handlePhotoFile(e.target.files[0]);
    });

    // Keyboard nav in modal
    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('photo-modal')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowLeft') showModalPhoto(modalState.index - 1);
      if (e.key === 'ArrowRight') showModalPhoto(modalState.index + 1);
    });
  }

  // ============================== Init ==============================
  document.addEventListener('DOMContentLoaded', function() {
    renderApp();
    attachEvents();
  });

  // ============================== Service Worker (オフライン対応) ==============================
  if ('serviceWorker' in navigator) {
    var swCode = "var CN='cleaning-v2';" +
      "self.addEventListener('install',function(e){self.skipWaiting()});" +
      "self.addEventListener('activate',function(e){e.waitUntil(caches.keys().then(function(ks){" +
      "return Promise.all(ks.filter(function(k){return k!==CN}).map(function(k){return caches.delete(k)}))" +
      "}).then(function(){return self.clients.claim()}))});" +
      "self.addEventListener('fetch',function(e){" +
      "if(e.request.method!=='GET'){return}" +
      "e.respondWith(fetch(e.request).then(function(res){" +
      "if(res&&res.status===200){var c=res.clone();caches.open(CN).then(function(cache){cache.put(e.request,c)})}" +
      "return res}).catch(function(){return caches.match(e.request)}))})";
    var blob = new Blob([swCode], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});
  }

})();
</script>
